name: Update Capitulation Dashboard

# ─────────────────────────────────────────────────────────────
# 自動更新左側抄底儀表板到 GitHub Pages。
#
# 更新時間(台灣時間 UTC+8,台灣不實施夏令 → 固定不漂移):
#     • 早上 09:00 台灣時間 = 01:00 UTC  → 台股盤前
#     • 晚上 21:00 台灣時間 = 13:00 UTC  → 美股盤前
#     • 晚上 22:30 台灣時間 = 14:30 UTC  → 美股開盤時段
#   每次執行都「完整重掃」整份 watchlist(美股 + 台股全部)。
#   另外:每次 push 進 main 也會自動重新部署(改了程式/清單即刻生效)。
#   註:排程只在 main 分支生效;GitHub 排程「盡力而為」,尖峰可能延遲數分鐘。
#
# 也可到 Actions 頁面手動觸發(workflow_dispatch)立即更新。
# ─────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 1 * * *'    # 09:00 台灣時間(台股盤前)
    - cron: '0 13 * * *'   # 21:00 台灣時間(美股盤前)
    - cron: '30 14 * * *'  # 22:30 台灣時間(美股開盤時段)
  push:
    branches: [main]        # 合併/推送進 main 即自動重新部署
  workflow_dispatch:        # 允許手動一鍵觸發

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署,新的取消排隊中的舊的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet yfinance pandas numpy requests

      - name: Run capitulation scan (generates reports/capitulation.html)
        run: python daily.py --no-open --quiet
        continue-on-error: true    # 個別標的抓不到資料不該讓整個部署失敗

      - name: Assemble site
        run: |
          mkdir -p _site
          if [ -f reports/capitulation.html ]; then
            cp reports/capitulation.html _site/index.html
          else
            echo "<h1>掃描暫時無法產生報告</h1><p>Yahoo 資料源可能暫時限流,下一個排程會重試。</p>" > _site/index.html
          fi
          # 附上原始 JSON 供除錯 / 程式讀取
          [ -f reports/capitulation.json ] && cp reports/capitulation.json _site/capitulation.json || true
          [ -f reports/daily_digest.json ] && cp reports/daily_digest.json _site/digest.json || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
